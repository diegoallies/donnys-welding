<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Donny's Welding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e5e5e5;--text2:#a3a3a3;--accent:#F59E0B;--accent2:#D97706;--red:#ef4444;--green:#22c55e}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-box{background:var(--bg2);border:1px solid #333;border-radius:12px;padding:2.5rem;max-width:400px;width:100%;text-align:center}
.login-box h1{font-size:1.5rem;margin-bottom:.3rem;color:#fff}
.login-box h1 span{color:var(--accent)}
.login-box p{color:var(--text2);font-size:.9rem;margin-bottom:1.5rem}
.login-box input{width:100%;padding:.9rem 1rem;background:var(--bg);border:1px solid #333;border-radius:6px;color:var(--text);font-size:1rem;margin-bottom:1rem;text-align:center}
.login-box input:focus{outline:none;border-color:var(--accent)}
.login-box button{width:100%;padding:.9rem;background:var(--accent);color:#000;border:none;border-radius:6px;font-size:1rem;font-weight:600;cursor:pointer}
.login-box button:hover{background:var(--accent2)}
.login-error{color:var(--red);font-size:.85rem;margin-top:.5rem;display:none}

/* ADMIN PANEL */
.admin-panel{display:none}
.admin-header{background:var(--bg2);border-bottom:1px solid #333;padding:1rem 1.5rem;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.admin-header h1{font-size:1.2rem;color:#fff}
.admin-header h1 span{color:var(--accent)}
.header-actions{display:flex;gap:.5rem;flex-wrap:wrap}
.btn{padding:.6rem 1.2rem;border-radius:6px;font-weight:600;font-size:.85rem;border:none;cursor:pointer;transition:all .2s}
.btn-restore{background:var(--green);color:#fff}
.btn-restore:hover{opacity:.85}
.btn-logout{background:#333;color:var(--text2)}
.btn-logout:hover{background:#444}

/* INFO BAR */
.info-bar{background:var(--bg3);border-bottom:1px solid #333;padding:.8rem 1.5rem;font-size:.85rem;color:var(--text2)}
.info-bar strong{color:var(--accent)}

/* GALLERY GRID */
.admin-gallery{padding:1.5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem}
.admin-item{position:relative;border-radius:8px;overflow:hidden;border:2px solid #333;aspect-ratio:4/3;background:var(--bg2)}
.admin-item img{width:100%;height:100%;object-fit:contain}
.admin-item.hidden-item{opacity:.35;border-color:var(--red)}
.admin-item .item-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.8);padding:.3rem .5rem;font-size:.7rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.delete-btn{position:absolute;top:6px;right:6px;width:36px;height:36px;background:var(--red);color:#fff;border:none;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.5);transition:transform .2s}
.delete-btn:hover{transform:scale(1.15)}
.restore-btn{position:absolute;top:6px;right:6px;width:36px;height:36px;background:var(--green);color:#fff;border:none;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.hidden-badge{position:absolute;top:6px;left:6px;background:var(--red);color:#fff;font-size:.65rem;font-weight:700;padding:.2rem .5rem;border-radius:4px}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--accent);color:var(--text);padding:.8rem 1.5rem;border-radius:8px;font-size:.9rem;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:500px){
  .admin-gallery{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.8rem;padding:1rem}
  .admin-header{padding:.8rem 1rem}
  .admin-header h1{font-size:1rem}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>Donny's <span>Welding</span></h1>
    <p>Admin Panel — Enter password to continue</p>
    <input type="password" id="pwInput" placeholder="Password" autofocus>
    <button onclick="tryLogin()">Log In</button>
    <div class="login-error" id="loginError">Wrong password. Try again.</div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-panel" id="adminPanel">
  <div class="admin-header">
    <h1>🔧 <span>Gallery</span> Admin</h1>
    <div class="header-actions">
      <button class="btn btn-restore" onclick="restoreAll()">↩ Restore All</button>
      <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="info-bar">
    Tap the <strong>red ✕</strong> to hide a photo from the website. Hidden photos can be restored with the <strong>green ↩</strong> button.
    <br>Changes take effect immediately on the main site (same browser/device).
  </div>
  <div class="admin-gallery" id="adminGallery"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const PASS='donny2025';
const STORAGE_KEY='donnys-hidden-gallery';

// All gallery images from index.html
const galleryItems=[
  {src:'images/security-gate-horizontal.jpg',alt:'Security gate with horizontal bars'},
  {src:'images/diamond-gate.jpg',alt:'Decorative diamond pattern gate'},
  {src:'images/burglar-bars-window.jpg',alt:'Burglar bars on window'},
  {src:'images/garden-gate.jpg',alt:'Garden gate with spear tops'},
  {src:'images/driveway-gates.jpg',alt:'Driveway gates'},
  {src:'images/window-bars-large.jpg',alt:'Large window burglar bars'},
  {src:'images/entrance-gates-white.jpg',alt:'White entrance gate panels'},
  {src:'images/security-door.jpg',alt:'Security door'},
  {src:'images/gate-fence.jpg',alt:'Gate and fence installation'},
  {src:'images/passage-gate.jpg',alt:'Passage security gate'},
  {src:'images/decorative-railing.jpg',alt:'Decorative railing'},
  {src:'images/braai-stand.jpg',alt:'Custom braai stand'},
  {src:'images/flip-braai.jpg',alt:'Custom flip braai'},
  {src:'images/clothing-rack.jpg',alt:'Custom clothing rack'},
  {src:'images/bed-frame.jpg',alt:'Custom welded bed frame'},
  {src:'images/freezer-hinge.jpg',alt:'Welding repair - freezer hinge'},
  {src:'images/slider-gate-track.jpg',alt:'Slider gate with track installation'},
  {src:'images/braai-grid.jpg',alt:'Custom braai grid'},
  {src:'images/pool-fencing.jpg',alt:'Fixed panel and sliding gate'},
  {src:'images/metal-chair.jpg',alt:'Custom metal chair'},
  {src:'images/window-awning.jpg',alt:'Window awning installation'},
  {src:'images/window-burglar-bars.jpg',alt:'Window burglar bars'},
  {src:'images/side-gate.jpg',alt:'Side entrance security gate'},
  {src:'images/coffee-table-finished.jpg',alt:'Custom coffee table'},
  {src:'images/table-frame.jpg',alt:'Coffee table steel frame'},
  {src:'images/bar-chair.jpg',alt:'Custom bar chair'},
  {src:'images/round-table-1.jpg',alt:'Round pedestal table'},
  {src:'images/round-table-2.jpg',alt:'Round pedestal table detail'},
  {src:'images/garden-bench-1.jpg',alt:'Swing chair converted to garden bench'},
  {src:'images/garden-bench-2.jpg',alt:'Garden bench - front view'},
  {src:'images/spear-top-driveway-gate.jpg',alt:'Driveway gate with spear tops'},
  {src:'images/single-bed-frame.jpg',alt:'Custom single bed frame'},
  {src:'images/queen-bed-base.jpg',alt:'Queen size steel bed base'},
  {src:'images/decorative-swing-gate.jpg',alt:'Slider gate with decorative scrolls'},
  {src:'images/burglar-bars-lock.jpg',alt:'Burglar bars'},
  {src:'images/window-bars-exterior.jpg',alt:'Window burglar bars - exterior'},
  {src:'images/window-bars-white.jpg',alt:'White window burglar bars'},
  {src:'images/door-gate-decorative.jpg',alt:'Door gate with decorative scrolls'},
  {src:'images/carport-balustrade.jpg',alt:'Carport balustrade fencing'},
  {src:'images/entrance-security-gate.jpg',alt:'Entrance security gate'},
  {src:'images/double-security-gate.jpg',alt:'Double security gate entrance'},
  {src:'images/shoe-rack-stand.jpg',alt:'Custom shoe rack and clothing stand'},
  {src:'images/indoor-railing.jpg',alt:'Indoor safety railing'},
  {src:'images/large-window-bars.jpg',alt:'Large window burglar bars'},
  {src:'images/brick-pattern-gate.jpg',alt:'Brick pattern security gate'},
  {src:'images/diamond-door-gate.jpg',alt:'Diamond pattern door gate'},
  {src:'images/white-security-gate.jpg',alt:'White security gate'},
  {src:'images/white-gate-panel.jpg',alt:'White gate panel with scrolls'},
  {src:'images/palisade-fencing.jpg',alt:'Palisade fencing with spear tops'},
  {src:'images/bathroom-burglar-bars.jpg',alt:'Bathroom window burglar bars'},
  {src:'images/window-bars-grey.jpg',alt:'Window burglar bars - grey'},
  {src:'images/wall-fencing-street.jpg',alt:'Wall top fencing'},
  {src:'images/fencing-with-gate.jpg',alt:'Property fencing with gate'},
  {src:'images/back-door-gate-black.jpg',alt:'Back door security gate'},
  {src:'images/door-gate-white.jpg',alt:'White door security gate'},
  {src:'images/pedestrian-gate-spear.jpg',alt:'Pedestrian gate with spear tops'},
  {src:'images/passage-gate-black.jpg',alt:'Passage security gate'},
  {src:'images/diamond-security-door.jpg',alt:'Diamond pattern security door'},
  {src:'images/carport-gate-system.jpg',alt:'Carport gate system'},
  {src:'images/solid-panel-gate.jpg',alt:'Solid panel security gate'},
  {src:'images/pallet-breaker-tool.jpg',alt:'Pallet buster'},
];

function getHidden(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch{return[]}}
function setHidden(arr){localStorage.setItem(STORAGE_KEY,JSON.stringify(arr))}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

function tryLogin(){
  const pw=document.getElementById('pwInput').value;
  if(pw===PASS){
    sessionStorage.setItem('donnys-admin','1');
    showAdmin();
  }else{
    document.getElementById('loginError').style.display='block';
    document.getElementById('pwInput').value='';
  }
}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin()});

function logout(){sessionStorage.removeItem('donnys-admin');location.reload()}

function showAdmin(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminPanel').style.display='block';
  renderGallery();
}

function renderGallery(){
  const hidden=getHidden();
  const grid=document.getElementById('adminGallery');
  grid.innerHTML='';
  galleryItems.forEach(item=>{
    const isHidden=hidden.includes(item.src);
    const div=document.createElement('div');
    div.className='admin-item'+(isHidden?' hidden-item':'');
    const fname=item.src.split('/').pop();
    div.innerHTML=`
      <img src="${item.src}" alt="${item.alt}" loading="lazy">
      <div class="item-label">${fname}</div>
      ${isHidden
        ?`<span class="hidden-badge">HIDDEN</span><button class="restore-btn" onclick="restoreItem('${item.src}')" title="Restore">↩</button>`
        :`<button class="delete-btn" onclick="hideItem('${item.src}')" title="Hide from website">✕</button>`
      }
    `;
    grid.appendChild(div);
  });
}

function hideItem(src){
  if(!confirm('Hide this photo from the website?'))return;
  const hidden=getHidden();
  if(!hidden.includes(src))hidden.push(src);
  setHidden(hidden);
  renderGallery();
  toast('Photo hidden from website');
}

function restoreItem(src){
  const hidden=getHidden().filter(s=>s!==src);
  setHidden(hidden);
  renderGallery();
  toast('Photo restored');
}

function restoreAll(){
  if(!confirm('Restore ALL hidden photos?'))return;
  setHidden([]);
  renderGallery();
  toast('All photos restored');
}

// Auto-login if session active
if(sessionStorage.getItem('donnys-admin')==='1')showAdmin();
</script>
</body>
</html>
