<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Donny's Welding - Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e5e5e5;--text2:#a3a3a3;--accent:#F59E0B;--accent2:#D97706;--red:#ef4444;--green:#22c55e;--blue:#3b82f6}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent)}

/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
#login.hidden{display:none}
.login-box{background:var(--bg2);border:1px solid #333;border-radius:12px;padding:2.5rem;width:100%;max-width:360px;text-align:center}
.login-box h1{font-size:1.5rem;margin-bottom:.3rem;color:#fff}
.login-box h1 span{color:var(--accent)}
.login-box p{color:var(--text2);font-size:.9rem;margin-bottom:1.5rem}
.login-box input{width:100%;padding:.9rem 1rem;background:var(--bg);border:1px solid #444;border-radius:8px;color:#fff;font-size:1rem;margin-bottom:1rem}
.login-box input:focus{outline:none;border-color:var(--accent)}
.login-box button{width:100%;padding:.9rem;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer}
.login-box button:hover{background:var(--accent2)}
.login-error{color:var(--red);font-size:.85rem;margin-top:.5rem;display:none}

/* ADMIN PANEL */
#admin{display:none;padding:1rem;max-width:1200px;margin:0 auto}
#admin.active{display:block}
.admin-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #333}
.admin-header h1{font-size:1.3rem;color:#fff}
.admin-header h1 span{color:var(--accent)}
.admin-actions{display:flex;gap:.5rem;flex-wrap:wrap}
.btn{padding:.7rem 1.2rem;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:.4rem;transition:all .2s}
.btn:active{transform:scale(.96)}
.btn-upload{background:var(--green);color:#fff}
.btn-save{background:var(--blue);color:#fff}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.btn-logout{background:#555;color:#fff}
.btn-upload:hover{filter:brightness(1.1)}
.btn-save:hover:not(:disabled){filter:brightness(1.1)}

/* STATUS */
#status{margin-bottom:1rem;padding:1rem;border-radius:8px;display:none;font-size:.9rem;line-height:1.5}
#status.info{display:block;background:rgba(59,130,246,.15);border:1px solid var(--blue);color:var(--blue)}
#status.success{display:block;background:rgba(34,197,94,.15);border:1px solid var(--green);color:var(--green)}
#status.error{display:block;background:rgba(239,68,68,.15);border:1px solid var(--red);color:var(--red)}

/* PROGRESS */
#progress{display:none;margin-bottom:1rem}
#progress.active{display:block}
.progress-bar{height:6px;background:#333;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;width:0}
#progress-text{font-size:.8rem;color:var(--text2);margin-top:.3rem}

/* GALLERY GRID */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.8rem}
@media(min-width:600px){.gallery-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
.gallery-card{position:relative;background:var(--bg2);border:1px solid #333;border-radius:8px;overflow:hidden;aspect-ratio:4/3}
.gallery-card img{width:100%;height:100%;object-fit:cover}
.gallery-card.pending-delete{opacity:.4;border-color:var(--red)}
.gallery-card.pending-upload{border-color:var(--green);border-width:2px}
.card-badge{position:absolute;top:6px;left:6px;padding:2px 8px;border-radius:4px;font-size:.7rem;font-weight:700;text-transform:uppercase}
.badge-new{background:var(--green);color:#fff}
.badge-delete{background:var(--red);color:#fff}
.card-actions{position:absolute;bottom:0;left:0;right:0;padding:.5rem;display:flex;justify-content:flex-end;gap:.3rem;background:linear-gradient(transparent,rgba(0,0,0,.7))}
.card-btn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .2s}
.card-btn:active{transform:scale(.9)}
.btn-delete{background:var(--red);color:#fff}
.btn-restore{background:var(--green);color:#fff}
.card-name{position:absolute;bottom:.5rem;left:.5rem;right:3rem;font-size:.7rem;color:#fff;text-shadow:0 1px 3px #000;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* LOADING */
#loading{display:flex;align-items:center;justify-content:center;padding:4rem;color:var(--text2)}
.spinner{width:30px;height:30px;border:3px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-right:1rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* CHANGES COUNTER */
.changes-badge{background:var(--accent);color:#000;border-radius:12px;padding:1px 7px;font-size:.75rem;font-weight:700;margin-left:.3rem}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login">
  <div class="login-box">
    <h1>Donny's <span>Welding</span></h1>
    <p>Admin Panel</p>
    <input type="password" id="pwd" placeholder="Enter password" autofocus>
    
    <button onclick="doLogin()">Login</button>
    <div class="login-error" id="loginErr">Incorrect password</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin">
  <div class="admin-header">
    <h1>🔧 Donny's <span>Welding</span> Admin</h1>
    <div class="admin-actions">
      <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">➕ Upload</button>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleUpload(this.files)">
      <button class="btn btn-save" id="saveBtn" onclick="saveChanges()" disabled>💾 Save<span class="changes-badge" id="changeCount" style="display:none">0</span></button>
      <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div id="status"></div>
  <div id="progress"><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><div id="progress-text"></div></div>
  <div id="loading"><div class="spinner"></div>Loading gallery...</div>
  <div class="gallery-grid" id="galleryGrid"></div>
</div>

<script>
const OWNER = 'diegoallies';
const REPO = 'donnys-welding';
const BRANCH = 'master';
let TOKEN = '';const _t='==wcpJDROJzc6tkMBBVWaFVa14UNOZjdN1UMxA1Yu1WdYZ1RkF2Xwh2Z';
const API = 'https://api.github.com';
const PASSWORD = 'donny2026';

let galleryImages = []; // {path, sha, url, alt, isNew, file, base64, deleted}
let pendingChanges = 0;

// --- AUTH ---
function doLogin() {
  const pwd = document.getElementById('pwd').value;
  if (pwd === PASSWORD) {
    TOKEN = atob(_t.split('').reverse().join(''));
    document.getElementById('login').classList.add('hidden');
    document.getElementById('admin').classList.add('active');
    loadGallery();
  } else {
    const err = document.getElementById('loginErr');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 2000);
  }
}
document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function logout() {
  document.getElementById('login').classList.remove('hidden');
  document.getElementById('admin').classList.remove('active');
  document.getElementById('pwd').value = '';
}

// --- GITHUB API HELPERS ---
async function ghFetch(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    ...opts,
    headers: { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json', ...(opts.headers || {}) }
  });
  if (!res.ok) throw new Error(`GitHub API ${res.status}: ${await res.text()}`);
  return res.json();
}

// --- LOAD GALLERY ---
async function loadGallery() {
  const loading = document.getElementById('loading');
  const grid = document.getElementById('galleryGrid');
  loading.style.display = 'flex';
  grid.innerHTML = '';
  galleryImages = [];

  try {
    // Get index.html to parse gallery items
    const indexFile = await ghFetch(`/repos/${OWNER}/${REPO}/contents/index.html?ref=${BRANCH}`);
    const html = atob(indexFile.content.replace(/\n/g, ''));
    
    // Parse gallery items from HTML
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const items = doc.querySelectorAll('.gallery-item');
    
    // Get image files with their SHAs
    let imageFiles = {};
    try {
      const imagesDir = await ghFetch(`/repos/${OWNER}/${REPO}/contents/images?ref=${BRANCH}`);
      imagesDir.forEach(f => { imageFiles[f.name] = { sha: f.sha, download_url: f.download_url }; });
    } catch(e) {}

    items.forEach((item, i) => {
      const img = item.querySelector('img');
      if (!img) return;
      const src = img.getAttribute('src') || '';
      const alt = img.getAttribute('alt') || '';
      const filename = src.split('/').pop();
      const fileInfo = imageFiles[filename] || {};
      galleryImages.push({
        path: src,
        filename,
        sha: fileInfo.sha || null,
        url: fileInfo.download_url || src,
        alt,
        isNew: false,
        deleted: false,
        index: i
      });
    });

    renderGallery();
    showStatus('', '');
  } catch (err) {
    showStatus(`Failed to load gallery: ${err.message}`, 'error');
  }
  loading.style.display = 'none';
}

// --- RENDER ---
function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = '';

  galleryImages.forEach((img, idx) => {
    const card = document.createElement('div');
    card.className = 'gallery-card' + (img.deleted ? ' pending-delete' : '') + (img.isNew ? ' pending-upload' : '');
    
    const imgEl = document.createElement('img');
    imgEl.src = img.isNew ? img.previewUrl : img.url;
    imgEl.alt = img.alt;
    imgEl.loading = 'lazy';
    card.appendChild(imgEl);

    // Badge
    if (img.isNew) {
      const badge = document.createElement('div');
      badge.className = 'card-badge badge-new';
      badge.textContent = 'NEW';
      card.appendChild(badge);
    } else if (img.deleted) {
      const badge = document.createElement('div');
      badge.className = 'card-badge badge-delete';
      badge.textContent = 'DELETE';
      card.appendChild(badge);
    }

    // Name
    const name = document.createElement('div');
    name.className = 'card-name';
    name.textContent = img.filename;
    card.appendChild(name);

    // Actions
    const actions = document.createElement('div');
    actions.className = 'card-actions';
    
    if (img.deleted) {
      const restoreBtn = document.createElement('button');
      restoreBtn.className = 'card-btn btn-restore';
      restoreBtn.innerHTML = '↩';
      restoreBtn.title = 'Restore';
      restoreBtn.onclick = () => { img.deleted = false; updateChanges(); renderGallery(); };
      actions.appendChild(restoreBtn);
    } else {
      const delBtn = document.createElement('button');
      delBtn.className = 'card-btn btn-delete';
      delBtn.innerHTML = '✕';
      delBtn.title = 'Delete';
      delBtn.onclick = () => {
        if (img.isNew) {
          galleryImages.splice(idx, 1);
        } else {
          img.deleted = true;
        }
        updateChanges();
        renderGallery();
      };
      actions.appendChild(delBtn);
    }
    card.appendChild(actions);
    grid.appendChild(card);
  });

  updateChanges();
}

function updateChanges() {
  pendingChanges = galleryImages.filter(i => i.deleted || i.isNew).length;
  const badge = document.getElementById('changeCount');
  const saveBtn = document.getElementById('saveBtn');
  if (pendingChanges > 0) {
    badge.style.display = 'inline';
    badge.textContent = pendingChanges;
    saveBtn.disabled = false;
  } else {
    badge.style.display = 'none';
    saveBtn.disabled = true;
  }
}

// --- UPLOAD ---
function handleUpload(files) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      const ext = file.name.split('.').pop().toLowerCase();
      const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '-').toLowerCase();
      // Avoid duplicates
      let finalName = safeName;
      let counter = 1;
      while (galleryImages.some(i => i.filename === finalName && !i.deleted)) {
        finalName = safeName.replace(`.${ext}`, `-${counter}.${ext}`);
        counter++;
      }
      galleryImages.push({
        path: `images/${finalName}`,
        filename: finalName,
        alt: finalName.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' '),
        isNew: true,
        deleted: false,
        base64,
        previewUrl: e.target.result,
        file
      });
      renderGallery();
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('fileInput').value = '';
}

// --- SAVE (GitHub Git Trees API for batch commit) ---
async function saveChanges() {
  if (pendingChanges === 0) return;
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  showProgress(0, 'Starting save...');

  try {
    // 1. Get current branch ref
    showProgress(10, 'Getting branch info...');
    const ref = await ghFetch(`/repos/${OWNER}/${REPO}/git/refs/heads/${BRANCH}`);
    const latestCommitSha = ref.object.sha;

    // 2. Get the commit to find tree
    const commit = await ghFetch(`/repos/${OWNER}/${REPO}/git/commits/${latestCommitSha}`);
    const baseTreeSha = commit.tree.sha;

    // 3. Create blobs for new images
    showProgress(20, 'Uploading new images...');
    const newImages = galleryImages.filter(i => i.isNew);
    const deletedImages = galleryImages.filter(i => i.deleted);
    
    const blobPromises = newImages.map(async (img) => {
      const blob = await ghFetch(`/repos/${OWNER}/${REPO}/git/blobs`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: img.base64, encoding: 'base64' })
      });
      return { path: img.path, sha: blob.sha, mode: '100644', type: 'blob' };
    });
    const newBlobs = await Promise.all(blobPromises);
    showProgress(50, 'Updating index.html...');

    // 4. Build updated index.html
    const indexFile = await ghFetch(`/repos/${OWNER}/${REPO}/contents/index.html?ref=${BRANCH}`);
    let html = atob(indexFile.content.replace(/\n/g, ''));

    // Remove deleted gallery items
    deletedImages.forEach(img => {
      // Remove the gallery-item div containing this image
      const regex = new RegExp(`\\s*<div class="gallery-item[^"]*"[^>]*>\\s*<img src="${img.path.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}"[^>]*>.*?</div>\\s*</div>`, 'gs');
      html = html.replace(regex, '');
    });

    // Add new gallery items before closing </div> of gallery-grid
    const newItemsHtml = newImages.map((img, i) => {
      const idx = galleryImages.filter(x => !x.deleted).length - newImages.length + i;
      return `\n    <div class="gallery-item fade-in" onclick="openLightbox(${idx})"><img src="${img.path}" alt="${img.alt}" loading="lazy"><div class="overlay"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg></div></div>`;
    }).join('');

    if (newItemsHtml) {
      // Find the last gallery-item and insert after it, or before closing gallery-grid div
      const galleryGridEnd = html.lastIndexOf('</div>', html.indexOf('<!-- WHY') > -1 ? html.indexOf('<!-- WHY') : html.indexOf('id="why"'));
      // Simpler: insert before the last </div> in the gallery section
      const gallerySectionMatch = html.match(/([\s\S]*<div class="gallery-grid"[^>]*>)([\s\S]*?)(<\/div>\s*<\/section>\s*(?:<!--\s*WHY|<section))/);
      if (gallerySectionMatch) {
        html = gallerySectionMatch[1] + gallerySectionMatch[2] + newItemsHtml + '\n  ' + gallerySectionMatch[3];
      }
    }

    // Fix lightbox indices
    let lightboxIdx = 0;
    html = html.replace(/openLightbox\(\d+\)/g, () => `openLightbox(${lightboxIdx++})`);

    // Also update the galleryImages array in the script section
    // Find and update the images array for the lightbox
    const activeImages = galleryImages.filter(i => !i.deleted);
    const imgArrayStr = activeImages.map(i => `'${i.path}'`).join(',');
    html = html.replace(/const images\s*=\s*\[([^\]]*)\]/, `const images = [${imgArrayStr}]`);

    showProgress(60, 'Creating commit...');

    // 5. Create blob for updated index.html
    const indexBlob = await ghFetch(`/repos/${OWNER}/${REPO}/git/blobs`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: btoa(unescape(encodeURIComponent(html))), encoding: 'base64' })
    });

    // 6. Build tree
    const treeItems = [
      { path: 'index.html', mode: '100644', type: 'blob', sha: indexBlob.sha },
      ...newBlobs
    ];
    // For deletions, set sha to null
    deletedImages.forEach(img => {
      treeItems.push({ path: img.path, mode: '100644', type: 'blob', sha: null });
    });

    showProgress(70, 'Building tree...');
    const tree = await ghFetch(`/repos/${OWNER}/${REPO}/git/trees`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ base_tree: baseTreeSha, tree: treeItems })
    });

    // 7. Create commit
    showProgress(85, 'Committing...');
    const parts = [];
    if (deletedImages.length) parts.push(`deleted ${deletedImages.length} image${deletedImages.length > 1 ? 's' : ''}`);
    if (newImages.length) parts.push(`added ${newImages.length} image${newImages.length > 1 ? 's' : ''}`);
    const msg = `Gallery update: ${parts.join(', ')}`;

    const newCommit = await ghFetch(`/repos/${OWNER}/${REPO}/git/commits`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, tree: tree.sha, parents: [latestCommitSha] })
    });

    // 8. Update branch ref
    showProgress(95, 'Updating branch...');
    await ghFetch(`/repos/${OWNER}/${REPO}/git/refs/heads/${BRANCH}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sha: newCommit.sha })
    });

    showProgress(100, 'Done!');
    showStatus('✅ Changes saved! Site will update in ~1 minute via Vercel auto-deploy.', 'success');
    
    // Reload gallery
    setTimeout(() => {
      hideProgress();
      loadGallery();
    }, 1500);

  } catch (err) {
    showStatus(`❌ Save failed: ${err.message}`, 'error');
    hideProgress();
    saveBtn.disabled = false;
  }
}

// --- UI HELPERS ---
function showStatus(msg, type) {
  const el = document.getElementById('status');
  if (!msg) { el.style.display = 'none'; return; }
  el.className = type;
  el.textContent = msg;
}

function showProgress(pct, text) {
  const wrap = document.getElementById('progress');
  wrap.classList.add('active');
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = text;
}

function hideProgress() {
  document.getElementById('progress').classList.remove('active');
}
</script>
</body>
</html>
